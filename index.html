<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Tabela 1: Lista de Nomes -->
        <table>
            <caption>Tabela 1: Convidados</caption>
            <thead><tr><th>Nome (MAIÚSCULO)</th></tr></thead>
            <tbody id="tabela-nomes"></tbody>
        </table>

        <!-- Tabela 2: Contagem -->
        <table>
            <caption>Tabela 2: Estatística</caption>
            <thead><tr><th>Filtro</th><th>Total</th></tr></thead>
            <tbody>
                <tr><td>Iniciam com "A"</td><td id="total-a">0</td></tr>
            </tbody>
        </table>

        <!-- Tabela 3: Sistema -->
        <table>
            <caption>Tabela 3: Logs</caption>
            <thead><tr><th>Tarefa</th><th>Status</th></tr></thead>
            <tbody>
                <tr><td>Loop de Processamento</td><td>Concluído</td></tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
