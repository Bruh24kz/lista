<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Convidados com Controles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Painel de Controle</h1>
        
        <!-- Botões de Ação -->
        <div class="controles">
            <button id="btn-ordenar" class="btn-info">Ordenar A-Z</button>
            <button id="btn-filtrar" class="btn-alerta">Filtrar Letra A</button>
            <button onclick="location.reload()">Resetar</button>
        </div>

        <table>
            <caption>Tabela 1: Lista de Convidados</caption>
            <thead><tr><th>Nome (MAIÚSCULO)</th></tr></thead>
            <tbody id="tabela-nomes"></tbody>
        </table>

        <table>
            <caption>Tabela 2: Estatística</caption>
            <thead><tr><th>Filtro</th><th>Total</th></tr></thead>
            <tbody>
                <tr><td>Iniciam com "A"</td><td id="total-a">0</td></tr>
            </tbody>
        </table>

        <table>
            <caption>Tabela 3: Logs</caption>
            <thead><tr><th>Última Ação</th><th>Status</th></tr></thead>
            <tbody>
                <tr><td id="log-acao">Nenhuma</td><td id="log-status">Aguardando</td></tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
