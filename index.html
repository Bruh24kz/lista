<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Convidados</h1>
        
        <!-- Painel de Botoes -->
        <div class="botoes">
            <button onclick="processarLista()" class="btn-primary">Processar Lista</button>
            <button onclick="filtrarA()" class="btn-filter">Filtrar Letra A</button>
            <button onclick="resetar()" class="btn-reset">Resetar</button>
        </div>

        <!-- Tabela 1: Lista -->
        <table>
            <caption>Tabela 1: Nomes Processados</caption>
            <thead><tr><th>Convidado</th></tr></thead>
            <tbody id="tabela-nomes"></tbody>
        </table>

        <!-- Tabela 2: Contagem -->
        <table>
            <caption>Tabela 2: Estatística</caption>
            <thead><tr><th>Critério</th><th>Resultado</th></tr></thead>
            <tbody>
                <tr><td>Iniciam com "A"</td><td id="contagem-a">0</td></tr>
            </tbody>
        </table>

        <!-- Tabela 3: Logs -->
        <table>
            <caption>Tabela 3: Status</caption>
            <thead><tr><th>Ação Executada</th><th>Horário</th></tr></thead>
            <tbody id="tabela-logs"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
