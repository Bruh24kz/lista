<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Tabela 1: Lista de Nomes -->
        <table>
            <caption>Tabela 1: Convidados (Maiúsculas)</caption>
            <thead><tr><th>Nome Completo</th></tr></thead>
            <tbody id="tabela-nomes"></tbody>
        </table>

        <!-- Tabela 2: Contagem Específica -->
        <table>
            <caption>Tabela 2: Estatísticas</caption>
            <thead><tr><th>Critério</th><th>Total</th></tr></thead>
            <tbody>
                <tr>
                    <td>Iniciam com a letra "A"</td>
                    <td id="contagem-a">0</td>
                </tr>
            </tbody>
        </table>

        <!-- Tabela 3: Status do Sistema -->
        <table>
            <caption>Tabela 3: Log do Sistema</caption>
            <thead><tr><th>Ação</th><th>Status</th></tr></thead>
            <tbody>
                <tr>
                    <td>Processamento de Loop</td>
                    <td style="color: green;">Concluído</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
