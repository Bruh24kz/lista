<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Convidados Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Painel Dinâmico de Convidados</h1>
        
        <!-- Entrada de Dados -->
        <div class="input-group">
            <input type="text" id="novo-nome" placeholder="Digite o nome do convidado...">
            <button onclick="adicionarConvidado()" class="btn-add">Adicionar</button>
        </div>

        <!-- Botoes de Controle -->
        <div class="botoes">
            <button onclick="renderizar(listaOriginal)" class="btn-primary">Ver Todos</button>
            <button onclick="filtrarA()" class="btn-filter">Filtrar "A"</button>
            <button onclick="limparTudo()" class="btn-reset">Limpar Lista</button>
        </div>

        <table>
            <caption>Tabela 1: Lista de Nomes (Processados)</caption>
            <thead><tr><th>Convidado</th></tr></thead>
            <tbody id="tabela-nomes"></tbody>
        </table>

        <table>
            <caption>Tabela 2: Estatística</caption>
            <thead><tr><th>Critério</th><th>Total</th></tr></thead>
            <tbody><tr><td>Começam com "A"</td><td id="total-a">0</td></tr></tbody>
        </table>

        <table>
            <caption>Tabela 3: Histórico</caption>
            <thead><tr><th>Ação</th><th>Status</th></tr></thead>
            <tbody><tr id="log-linha"><td>Sistema Pronto</td><td>OK</td></tr></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
